<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
  </defs>
  <!-- Rounded square backdrop -->
  <rect width="100" height="100" rx="26" fill="#13131a" stroke="rgba(255, 255, 255, 0.08)" stroke-width="2"/>
  
  <!-- Geometric "A" which doubles as a shopping cart -->
  <!-- Left leg / handle of cart -->
  <path d="M28 72 L47 28 C48.5 24 51.5 24 53 28 L72 72" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Crossbar / basket of cart -->
  <path d="M34 56 L66 56 L60 42 L40 42 Z" fill="url(#grad2)" />
  
  <!-- Wheels -->
  <circle cx="34" cy="74" r="5" fill="#f59e0b" />
  <circle cx="66" cy="74" r="5" fill="#fbbf24" />
</svg>
